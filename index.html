function switchTab(id) {
  document.querySelectorAll(&#x27;.tab&#x27;).forEach(t =&gt; t.classList.remove(&#x27;active&#x27;));

  const idx = tabs.indexOf(id);
  if (idx &gt;= 0) document.querySelectorAll(&#x27;.tab&#x27;)[idx].classList.add(&#x27;active&#x27;);
  
  document.getElementById(&#x27;tab-&#x27; + id).classList.add(&#x27;active&#x27;);

            const v = c.parsed.y;
            if (v === null) return c.dataset.label + &#x27;: sin dato&#x27;;
            return &#x27; &#x27; + c.dataset.label + &#x27;: $&#x27; + v.toFixed(2) + &#x27;B COP&#x27;;
          }}}
        },
        scales: {
          x: {grid:{display:false}, ticks:{font:{size:10}}},
          y: {ticks:{callback:v=&gt;&#x27;$&#x27;+v.toFixed(1)+&#x27;B&#x27;}, grid:{color:&#x27;rgba(0,0,0,0.05)&#x27;}}
        }
      }
    });
  }
  
  // Drop size tendencia
  const ctx4 = document.getElementById(&#x27;ch-hist-drop&#x27;);
  if (ctx4) {
    new Chart(ctx4, {
      type: &#x27;line&#x27;,
      data: {
        labels: volLabels,
        datasets: [
          {label:&#x27;Drop Size MMC&#x27;,data:volDrop,borderColor:&#x27;rgba(85,53,160,0.9)&#x27;,backgroundColor:&#x27;rgba(85,53,160,0.08)&#x27;,borderWidth:2.5,pointRadius:4,fill:true,tension:0.3}
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins: {
          legend: {display:false},
          tooltip: {callbacks:{label:c=&gt;` Drop: ${c.parsed.y.toFixed(1)} CU/cliente`}}
        },
        scales: {
          x: {grid:{display:false}, ticks:{font:{size:10}}},
          y: {title:{display:true,text:&#x27;CU por cliente atendido&#x27;},ticks:{callback:v=&gt;v+&#x27; CU&#x27;}, grid:{color:&#x27;rgba(0,0,0,0.05)&#x27;}}
        }
      }
    });
  }
}
&lt;/script&gt;
